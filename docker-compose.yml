services:
  agentshow:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - agentshow-data:/data
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  agentshow-data:
