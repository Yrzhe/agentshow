  <path d="M 418,88 C 420,86 785,84 788,88 C 790,90 792,438 788,442 C 786,444 422,446 418,442 C 416,440 416,90 418,88" fill="none" stroke="#1e1e1e" stroke-width="1.5" opacity="0.8"/>

  <text x="438" y="118" class="phase">Phase 2 — Shareable Sessions</text>

  <!-- CLI box -->
  <path d="M 438,140 C 440,138 558,137 560,140 C 562,142 563,182 560,185 C 558,187 442,188 438,185 C 436,183 436,142 438,140" fill="#fff4e6" stroke="#e8590c" stroke-width="1.8"/>
  <text x="499" y="168" text-anchor="middle" class="code" fill="#e8590c">$ agentshow push</text>

  <!-- Arrow to workers -->
  <path d="M 560,162 C 575,160 590,159 608,162" fill="none" stroke="#e8590c" stroke-width="1.5" marker-end="url(#hand2)"/>

