<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Virgil:wght@400&amp;display=swap');
    text { font-family: 'Virgil', 'Segoe Print', 'Comic Sans MS', 'Bradley Hand', cursive; fill: #1e1e1e; }
    .title { font-size: 30px; font-weight: 400; }
    .phase { font-size: 19px; fill: #1e1e1e; }
    .label { font-size: 15px; }
    .small { font-size: 13px; fill: #555; }
    .code { font-family: 'Virgil', 'Segoe Print', cursive; font-size: 12px; fill: #555; }
  </style>

  <rect width="1200" height="540" fill="#ffffff" rx="0"/>

  <!-- Title -->
  <text x="40" y="40" class="title">AgentShow</text>
  <text x="40" y="62" class="small" style="font-size:14px; fill:#888">local agent awareness → shareable sessions → agent discovery</text>

  <!-- ═══ PHASE 1 ═══ -->
  <!-- Hand-drawn box -->
  <path d="M 28,88 C 30,86 395,84 398,88 C 400,90 402,438 398,442 C 396,444 32,446 28,442 C 26,440 26,90 28,88" fill="none" stroke="#1e1e1e" stroke-width="1.5" opacity="0.8"/>

  <text x="48" y="118" class="phase">Phase 1 — Local MCP</text>

  <!-- Agent A box (sketchy) -->
  <path d="M 50,135 C 52,133 196,132 198,135 C 200,137 201,227 198,230 C 196,232 52,233 50,230 C 48,228 48,137 50,135" fill="#e3ecfa" stroke="#1971c2" stroke-width="1.8" opacity="0.9"/>
  <text x="124" y="162" text-anchor="middle" class="label" fill="#1971c2">Claude Code</text>
  <text x="124" y="182" text-anchor="middle" class="code" fill="#1971c2">Agent A</text>
  <text x="124" y="218" text-anchor="middle" class="code" fill="#1971c2" style="font-size:11px">refactoring auth</text>

  <!-- Agent B box (sketchy) -->
  <path d="M 228,135 C 230,133 376,132 378,135 C 380,137 381,227 378,230 C 376,232 232,233 228,230 C 226,228 226,137 228,135" fill="#e3ecfa" stroke="#1971c2" stroke-width="1.8" opacity="0.9"/>
  <text x="303" y="162" text-anchor="middle" class="label" fill="#1971c2">Cursor</text>
  <text x="303" y="182" text-anchor="middle" class="code" fill="#1971c2">Agent B</text>
  <text x="303" y="218" text-anchor="middle" class="code" fill="#1971c2" style="font-size:11px">updating schema</text>

  <!-- Sketchy arrows between agents -->
  <path d="M 198,170 C 205,168 218,167 228,170" fill="none" stroke="#1971c2" stroke-width="1.5" marker-end="url(#hand1)"/>
  <path d="M 228,195 C 218,197 208,198 198,195" fill="none" stroke="#1971c2" stroke-width="1.5" marker-end="url(#hand1)"/>
  <text x="213" y="160" text-anchor="middle" class="code" fill="#1971c2" style="font-size:11px">sync</text>

  <!-- API list (sketchy box) -->
  <path d="M 50,250 C 52,248 376,247 378,250 C 380,252 381,362 378,365 C 376,367 52,368 50,365 C 48,363 48,252 50,250" fill="#fff" stroke="#1971c2" stroke-width="1.2" stroke-dasharray="6,4" opacity="0.7"/>
  <text x="68" y="278" class="code" fill="#1971c2">register_status()</text>
  <text x="225" y="278" class="small">→ "i'm on X"</text>
  <text x="68" y="300" class="code" fill="#1971c2">get_peers()</text>
  <text x="225" y="300" class="small">→ what others do</text>
  <text x="68" y="322" class="code" fill="#1971c2">share_note()</text>
  <text x="225" y="322" class="small">→ pass context</text>
  <text x="68" y="344" class="code" fill="#1971c2">get_project_history()</text>
  <text x="225" y="344" class="small">→ session log</text>

  <!-- SQLite (pill shape, sketchy) -->
  <path d="M 130,385 C 140,375 280,375 290,385 C 300,395 300,408 290,418 C 280,428 140,428 130,418 C 120,408 120,395 130,385" fill="#e3ecfa" stroke="#1971c2" stroke-width="1.2"/>
  <text x="210" y="405" text-anchor="middle" class="code" fill="#1971c2">SQLite + .agentshow.json</text>

  <!-- Line down to sqlite -->
  <path d="M 210,365 C 212,372 211,378 210,385" fill="none" stroke="#1971c2" stroke-width="1" stroke-dasharray="4,3"/>

